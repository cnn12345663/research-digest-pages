<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Digest</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f7f7f4; color: #1d1d1b; }
    main { max-width: 980px; margin: 0 auto; padding: 28px 16px 44px; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { line-height: 1.65; }
    .meta { color: #5f625b; margin-bottom: 24px; }
    .grid { display: grid; gap: 12px; }
    article { background: #fff; border: 1px solid #deded8; border-radius: 8px; padding: 16px; }
    h2 { font-size: 18px; margin: 0 0 8px; }
    a { color: #0f5c8c; }
  </style>
</head>
<body>
  <main>
    <h1>Research Digest</h1>
    <p class="meta">Hermes GitHub Pages publishing test page.</p>
    <section class="grid">
      <article>
        <h2>Setup pending</h2>
        <p>After GITHUB_USERNAME and GITHUB_TOKEN are configured, Hermes can replace this page with the daily digest.</p>
      </article>
    </section>
  </main>
</body>
</html>
